<script>

	let xhr = new XMLHttpRequest();
	xhr.open('GET', 'https://monevrkpd.tegalkota.go.id/emonev2025/api/pubapi/emonev-dashboard', false);

	let persen_real_keu =0;
	let persen_unreal_keu=0;
	let xresp=null;

	try {
		xhr.send();
		if (xhr.status != 200) {
			console.log(`Error ${xhr.status}: ${xhr.statusText}`);
		} else {
			xresp=JSON.parse(xhr.responseText);
			//docBody.insertParagraph(xresp,Word.InsertLocation.start);
			document.getElementById("topbox-jml-program-rpjmd").innerHTML=Number(xresp.summary.jml_program_rpd).toFixed(0) ;
			document.getElementById("topbox-jml-program-rkpd").innerHTML=Number(xresp.summary.jml_program_rkpd).toFixed(0) ;
			document.getElementById("topbox-jml-kegiatan").innerHTML=Number(xresp.summary.jml_kegiatan_apbd).toFixed(0);	
			document.getElementById("topbox-jml-subkegiatan").innerHTML=Number(xresp.summary.jml_subkegiatan_apbd).toFixed(0);	

			document.getElementById("topbox-anggaran-total").innerHTML= new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(xresp.summary.total_anggaran);	
			document.getElementById("topbox-anggaran-serapan").innerHTML= new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(xresp.summary.total_realisasi_keuangan);
			persen_real_keu = Number(xresp.summary.total_realisasi_keuangan) / Number(xresp.summary.total_anggaran) *100;
			persen_unreal_keu = 100 - persen_real_keu;
		}
	} catch(err) {
	console.log("Request failed");
	}  



"use strict";
// Shared Colors Definition
const primary = '#6993FF';
const success = '#1BC5BD';
const info = '#8950FC';
const warning = '#FFA800';
const danger = '#F64E60';


var ctargetfisik = [];
var crealfisik=[];
var ctargetkeu=[];
var crealkeu=[];
for(var i in xresp.chartrfk) {
	ctargetfisik.push(Number(xresp.chartrfk[i].y1value).toFixed(2));
	crealfisik.push(Number(xresp.chartrfk[i].y2value).toFixed(2) );
	ctargetkeu.push(Number(xresp.chartrfk[i].y3value).toFixed(2) );
	crealkeu.push(Number( xresp.chartrfk[i].y4value).toFixed(2));
}
console.log(crealkeu);


var EMonevChartsDashboard = function () {
	var _chartRFK = function () {
		const apexChart = "#chartRFK";
		var options = {
			series: [
			{
				name: 'IKU Kota',
				data: ctargetfisik
			}, 
			{
				name: 'IKU OPD',
				data: crealfisik
			},
			{
				name: 'Program',
				data: ctargetkeu
			},
			{
				name: 'Kegiatan',
				data: ctargetkeu
			},
			{
				name: 'Sub Kegiatan',
				data: crealkeu
			},
			],
			chart: {
				height: 350,
				type: 'area'
			},
			dataLabels: {
				enabled: false
			},
			stroke: {
				curve: 'smooth'
			},
			xaxis: {
				categories: ['Tw I', 'Tw II', 'Tw III', 'Tw IV'],
			},
			tooltip: {
				//x: {format: 'dd/MM/yy HH:mm'},
			},
			colors: [primary, success,warning,info]
		};

		var chart = new ApexCharts(document.querySelector(apexChart), options);
		chart.render();
	}

	var _chartPieKeuangan = function () {
		const apexChart = "#chartKeuangan";
		var options = {			
			series: [persen_real_keu,persen_unreal_keu],
			labels: ['Diserap', 'Belum Diserap'],
			chart: {
				width: 350,
				type: 'donut',
			},
			responsive: [{
				breakpoint: 480,
				options: {
					chart: {
						width: 350
					},
					legend: {
						position: 'bottom'
					}
				}
			}],
			
			colors: [success, danger]
		};

		var chart = new ApexCharts(document.querySelector(apexChart), options);
		chart.render();
	}


	var chrt_rankopd=[];
	var chrt_rankopd_rfisik=[];
	var chrt_rankopd_rkeu=[];
	for(var i in xresp.chartRank) {
		chrt_rankopd.push(xresp.chartRank[i].nama_pd);
		chrt_rankopd_rfisik.push(xresp.chartRank[i].r_fisik);
		chrt_rankopd_rkeu.push(xresp.chartRank[i].persen_real_keu);
	}
	console.log(chrt_rankopd);
	

	var _chartRfkOpd = function () {
		var options = {
          series: [
			  { 
				name: 'Realisasi Fisik',
          data: chrt_rankopd_rfisik
        }, {
			name: 'Realisasi Keuangan',
          data: chrt_rankopd_rkeu
        }],
          chart: {
          type: 'bar',
          height: 2530
        },
        plotOptions: {
          bar: {
            horizontal: true,
            dataLabels: {
              position: 'top',
            },
          }
        },
        dataLabels: {
          enabled: true,
          offsetX: -6,
          style: {
            fontSize: '12px',
            colors: ['#fff']
          }
        },
        stroke: {
          show: true,
          width: 1,
          colors: ['#fff']
        },
        tooltip: {
          shared: true,
          intersect: false
        },
        xaxis: {
          categories: chrt_rankopd,
        },
		colors: [success, danger]
        };

        var chart = new ApexCharts(document.querySelector("#chartRFK_OPD"), options);
        chart.render();
	}

	return {
		// public functions
		init: function () {
			_chartRFK();
			_chartPieKeuangan();
			_chartRfkOpd();
		}
	};
}();

tabletbodyopdasc = document.getElementById("table-tbody-opd-asc");

for(var i in xresp.chartRank) {

	tr.appendChild(td3);
	
	tabletbodyopdasc.appendChild(tr);

}

	td1.innerHTML = '<a href="#" class="text-dark-75 font-weight-bolder text-hover-primary mb-1 font-size-lg">'+ ( Number(i)+1)+'</a>';

	tr.appendChild(td3);
	
	tabletbodyopddesc.appendChild(tr);
